<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reporting — Prompt Optimization Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --brand:        #2563eb;
  --brand-light:  #eff6ff;
  --brand-border: #bfdbfe;
  --success:      #16a34a;
  --success-bg:   #f0fdf4;
  --success-bd:   #bbf7d0;
  --error:        #dc2626;
  --error-bg:     #fef2f2;
  --error-bd:     #fecaca;
  --warning:      #d97706;
  --warning-bg:   #fffbeb;
  --warning-bd:   #fde68a;
  --purple:       #7c3aed;
  --purple-bg:    #f5f3ff;
  --purple-bd:    #ddd6fe;
  --border:       #e5e7eb;
  --border-md:    #d1d5db;
  --text-1:       #111827;
  --text-2:       #374151;
  --text-3:       #6b7280;
  --text-4:       #9ca3af;
  --surface:      #ffffff;
  --surface-2:    #f9fafb;
  --surface-3:    #f3f4f6;
}
*, *::before, *::after { box-sizing: border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--surface-2); color: var(--text-1); -webkit-font-smoothing: antialiased; }
.scrollbar-thin::-webkit-scrollbar { width: 4px; height: 4px; }
.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
.scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

.fade-in { animation: fadeIn .18s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
@keyframes spin { to { transform: rotate(360deg); } }

.badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:600; letter-spacing:.02em; }
.badge-pass    { background:var(--success-bg); color:var(--success);  border:1px solid var(--success-bd); }
.badge-fail    { background:var(--error-bg);   color:var(--error);    border:1px solid var(--error-bd); }
.badge-pending { background:var(--surface-3);  color:var(--text-3);   border:1px solid var(--border); }
.badge-live    { background:var(--brand-light); color:var(--brand);   border:1px solid var(--brand-border); }
.badge-custom  { background:var(--purple-bg);  color:var(--purple);   border:1px solid var(--purple-bd); }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:5px; padding:6px 12px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; transition:all .14s; border:1px solid transparent; white-space:nowrap; line-height:1.4; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn-primary { background:var(--brand); color:#fff; border-color:var(--brand); }
.btn-primary:hover:not(:disabled) { background:#1d4ed8; }
.btn-ghost   { background:var(--surface); color:var(--text-2); border-color:var(--border-md); }
.btn-ghost:hover:not(:disabled)   { background:var(--surface-2); border-color:#9ca3af; }
.btn-danger  { background:var(--surface); color:var(--error); border-color:var(--error-bd); }
.btn-danger:hover:not(:disabled)  { background:var(--error-bg); }
.btn-sm { padding:4px 9px; font-size:11px; border-radius:5px; }
.btn-icon { padding:4px 6px; font-size:11px; border-radius:5px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.06); }

.run-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all .15s;
}
.run-card.selected { border-color: var(--brand); background: var(--brand-light); }
.run-card-header {
  padding: 12px 16px;
  cursor: pointer;
}
.run-card-header:hover { background: var(--surface-2); border-radius: 10px; }
.run-card.selected .run-card-header:hover { background: #dbeafe; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  text-align: center;
}

/* Conversation viewer */
.turn-user {
  background: var(--brand-light);
  border: 1px solid var(--brand-border);
  border-radius: 8px;
  padding: 8px 10px;
}
.turn-bot {
  background: var(--success-bg);
  border: 1px solid var(--success-bd);
  border-radius: 8px;
  padding: 8px 10px;
}
.turn-bot-empty {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}
</style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header id="page-header" class="flex items-center gap-3 px-5 border-b border-gray-200 bg-white shrink-0 shadow-sm" style="height:48px">
  <div class="flex items-center gap-2 shrink-0">
    <div class="w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold" style="background:var(--brand)">P</div>
    <span class="font-semibold text-gray-800 text-sm tracking-tight">Prompt Optimization Lab</span>
  </div>
  <div class="w-px h-4 bg-gray-200 shrink-0 mx-0.5"></div>
  <span class="text-xs font-semibold" style="color:var(--purple)">Reporting</span>
  <div class="flex-1"></div>
  <a href="/" class="btn btn-ghost btn-sm">&larr; Back to Lab</a>
</header>

<!-- Main content -->
<div class="flex-1 overflow-y-auto scrollbar-thin">
  <div class="max-w-5xl mx-auto px-6 py-6">

    <!-- Header section -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-lg font-bold text-gray-900">Test Reports</h1>
        <p class="text-xs text-gray-500 mt-0.5">Select runs to download individual or consolidated reports.</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="selection-count" class="text-xs text-gray-400"></span>
        <button onclick="downloadSelected()" id="btn-download" class="btn btn-primary btn-sm" disabled>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10"/></svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="flex items-center gap-3 mb-4">
      <button onclick="setFilter('all')" id="filter-all" class="btn btn-sm btn-ghost" style="font-weight:600">All</button>
      <button onclick="setFilter('live_validate')" id="filter-live" class="btn btn-sm btn-ghost">Live Validate</button>
      <button onclick="setFilter('custom')" id="filter-custom" class="btn btn-sm btn-ghost">Custom</button>
      <div class="flex-1"></div>
      <button onclick="selectAll()" class="btn btn-sm btn-ghost" style="font-size:10px">Select All</button>
      <button onclick="deselectAll()" class="btn btn-sm btn-ghost" style="font-size:10px">Clear</button>
    </div>

    <!-- Stats overview -->
    <div id="stats-bar" class="grid grid-cols-4 gap-3 mb-5">
      <div class="stat-card">
        <div class="text-2xl font-bold" style="color:var(--brand)" id="stat-total">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Total Runs</div>
      </div>
      <div class="stat-card">
        <div class="text-2xl font-bold text-gray-700" id="stat-tests">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Total Tests</div>
      </div>
      <div class="stat-card">
        <div class="text-2xl font-bold" style="color:var(--success)" id="stat-passed">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Passed</div>
      </div>
      <div class="stat-card">
        <div class="text-2xl font-bold" style="color:var(--error)" id="stat-failed">0</div>
        <div class="text-xs text-gray-500 mt-0.5">Failed</div>
      </div>
    </div>

    <!-- Runs list -->
    <div id="runs-container" class="space-y-2">
      <div class="text-center py-12 text-gray-400 text-sm">Loading runs...</div>
    </div>
  </div>
</div>

<script>
const IS_EMBEDDED = new URLSearchParams(window.location.search).get('embedded') === '1';
if (IS_EMBEDDED) {
  document.addEventListener('DOMContentLoaded', () => {
    const hdr = document.getElementById('page-header');
    if (hdr) hdr.style.display = 'none';
  });
}

let allRuns = [];
let selectedRunIds = new Set();   // "source:id"
let currentFilter = 'all';
let expandedRuns = new Set();     // "source:id" — run cards expanded to show test cases
let expandedConvs = new Set();    // "source:id:idx" — test case conversations expanded

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return r.json();
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function runKey(r) { return `${r.source}:${r.id}`; }

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  allRuns = await api('/api/reporting/runs');
  updateStats();
  renderRuns();
}

function updateStats() {
  const filtered = getFilteredRuns();
  let totalTests = 0, passed = 0, failed = 0;
  filtered.forEach(r => {
    const results = r.results || [];
    totalTests += results.length;
    passed += results.filter(x => x.overall === 'PASS').length;
    failed += results.filter(x => x.overall === 'FAIL').length;
  });
  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-tests').textContent = totalTests;
  document.getElementById('stat-passed').textContent = passed;
  document.getElementById('stat-failed').textContent = failed;
}

function getFilteredRuns() {
  if (currentFilter === 'all') return allRuns;
  return allRuns.filter(r => r.source === currentFilter);
}

function setFilter(f) {
  currentFilter = f;
  ['all', 'live', 'custom'].forEach(k => {
    const btn = document.getElementById(`filter-${k}`);
    if (btn) {
      const match = (k === 'all' && f === 'all') || (k === 'live' && f === 'live_validate') || (k === 'custom' && f === 'custom');
      btn.style.background = match ? 'var(--brand-light)' : '';
      btn.style.color = match ? 'var(--brand)' : '';
      btn.style.borderColor = match ? 'var(--brand-border)' : '';
    }
  });
  updateStats();
  renderRuns();
}

function selectAll() {
  getFilteredRuns().forEach(r => selectedRunIds.add(runKey(r)));
  renderRuns();
  updateSelectionUI();
}

function deselectAll() {
  selectedRunIds.clear();
  renderRuns();
  updateSelectionUI();
}

function toggleRun(source, id, event) {
  event.stopPropagation();
  const key = `${source}:${id}`;
  if (selectedRunIds.has(key)) selectedRunIds.delete(key);
  else selectedRunIds.add(key);
  renderRuns();
  updateSelectionUI();
}

function updateSelectionUI() {
  const count = selectedRunIds.size;
  document.getElementById('selection-count').textContent = count ? `${count} selected` : '';
  document.getElementById('btn-download').disabled = !count;
}

// ── Expand / collapse run ─────────────────────────────────────────────────────
function toggleExpand(source, id, event) {
  event.stopPropagation();
  const key = `${source}:${id}`;
  if (expandedRuns.has(key)) expandedRuns.delete(key);
  else expandedRuns.add(key);
  renderRuns();
}

// ── Expand / collapse individual conversation ─────────────────────────────────
function toggleConv(convKey, event) {
  event.stopPropagation();
  if (expandedConvs.has(convKey)) expandedConvs.delete(convKey);
  else expandedConvs.add(convKey);
  renderRuns();
}

// ── Delete run ────────────────────────────────────────────────────────────────
async function deleteRun(source, id, event) {
  event.stopPropagation();
  if (!confirm('Delete this run and all its results? This cannot be undone.')) return;

  const endpoint = source === 'custom'
    ? `/api/custom/runs/${id}`
    : `/api/playwright/runs/${id}`;

  try {
    const resp = await fetch(endpoint, { method: 'DELETE' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      alert(err.error || 'Delete failed');
      return;
    }
    allRuns = allRuns.filter(r => !(r.source === source && r.id === id));
    selectedRunIds.delete(`${source}:${id}`);
    expandedRuns.delete(`${source}:${id}`);
    updateStats();
    renderRuns();
    updateSelectionUI();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

// ── Conversation viewer helpers ───────────────────────────────────────────────
function renderConversationTurns(turns) {
  if (!turns || !turns.length) {
    return '<div class="text-xs text-gray-400 italic px-1 py-2">No turns recorded.</div>';
  }
  return turns.map(t => {
    const hasResponse = t.actual && t.actual !== '(no response captured)';
    return `
      <div class="space-y-1">
        <div class="turn-user">
          <div class="text-xs font-semibold mb-1" style="color:var(--brand)">Turn ${esc(String(t.turn))} &mdash; User</div>
          <div class="text-xs text-gray-800">${esc(t.user || '(empty)')}</div>
          ${t.expected ? `<div class="text-xs mt-1" style="color:var(--text-3)">Expected: ${esc(t.expected)}</div>` : ''}
        </div>
        <div class="${hasResponse ? 'turn-bot' : 'turn-bot-empty'}">
          <div class="text-xs font-semibold mb-1" style="color:${hasResponse ? 'var(--success)' : 'var(--text-3)'}">Bot</div>
          <div class="text-xs" style="white-space:pre-wrap;color:${hasResponse ? 'var(--text-1)' : 'var(--text-3)'}">${esc(t.actual || '(no response captured)')}</div>
        </div>
      </div>`;
  }).join('');
}

function renderTestCases(r) {
  const results = r.results || [];
  if (!results.length) {
    return '<div class="text-xs text-gray-400 italic p-4 text-center">No test results for this run.</div>';
  }

  return results.map((res, idx) => {
    const overall = (res.overall || 'pending').toUpperCase();
    const badgeCls = overall === 'PASS' ? 'badge-pass' : overall === 'FAIL' ? 'badge-fail' : 'badge-pending';
    const turns = res.turns || [];
    const convKey = `${r.source}:${r.id}:${idx}`;
    const convExpanded = expandedConvs.has(convKey);

    return `
      <div class="border rounded-lg overflow-hidden mb-2" style="border-color:${overall === 'PASS' ? 'var(--success-bd)' : overall === 'FAIL' ? 'var(--error-bd)' : 'var(--border)'}">
        <!-- Test case header -->
        <div class="flex items-center gap-2 px-3 py-2 cursor-pointer"
             style="background:${overall === 'PASS' ? 'var(--success-bg)' : overall === 'FAIL' ? 'var(--error-bg)' : 'var(--surface-3)'}"
             onclick="toggleConv('${convKey}', event)">
          <span class="badge ${badgeCls}">${overall}</span>
          <span class="text-xs font-semibold text-gray-800">${esc(res.test_id || '')}${res.name ? ' &mdash; ' + esc(res.name) : ''}</span>
          <span class="flex-1"></span>
          <span class="text-xs text-gray-400">${turns.length} turn${turns.length !== 1 ? 's' : ''}</span>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               style="transform:${convExpanded ? 'rotate(180deg)' : 'none'};transition:transform .15s;color:var(--text-3)">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </div>
        ${res.summary ? `<div class="px-3 py-1.5 text-xs" style="color:var(--text-3);background:var(--surface-2);border-top:1px solid var(--border)">Judge: ${esc(res.summary)}</div>` : ''}
        <!-- Conversation turns (expandable) -->
        ${convExpanded ? `
          <div class="p-3 space-y-3" style="border-top:1px solid var(--border);background:var(--surface)">
            ${renderConversationTurns(turns)}
          </div>
        ` : ''}
      </div>`;
  }).join('');
}

// ── Render runs ───────────────────────────────────────────────────────────────
function renderRuns() {
  const container = document.getElementById('runs-container');
  const runs = getFilteredRuns();

  if (!runs.length) {
    container.innerHTML = '<div class="text-center py-12 text-gray-400 text-sm">No runs found.</div>';
    updateSelectionUI();
    return;
  }

  container.innerHTML = runs.map(r => {
    const key = runKey(r);
    const sel = selectedRunIds.has(key);
    const isExpanded = expandedRuns.has(key);
    const results = r.results || [];
    const total = results.length;
    const passed = results.filter(x => x.overall === 'PASS').length;
    const failed = results.filter(x => x.overall === 'FAIL').length;
    const pct = total ? Math.round(passed / total * 100) : 0;
    const agents = (r.agent_names || []).join(', ') || 'Unknown';
    const sourceBadge = r.source === 'custom'
      ? '<span class="badge badge-custom">Custom</span>'
      : '<span class="badge badge-live">Live Validate</span>';

    const pctColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--error)';
    const statusDot = r.status === 'done'
      ? `<span style="color:var(--success)">&#10004;</span>`
      : r.status === 'stopped'
      ? `<span style="color:var(--error)">&#9632;</span>`
      : `<span style="color:var(--warning)">&#9679;</span>`;

    return `
    <div class="run-card${sel ? ' selected' : ''}">
      <!-- Card header row -->
      <div class="run-card-header flex items-center gap-3" onclick="toggleExpand('${r.source}', ${r.id}, event)">
        <input type="checkbox" ${sel ? 'checked' : ''} onclick="toggleRun('${r.source}', ${r.id}, event)"
          class="shrink-0 w-4 h-4 rounded border-gray-300 text-blue-600 cursor-pointer"/>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-semibold text-gray-800 text-xs">Run #${r.id}</span>
            ${sourceBadge}
            <span class="text-gray-400 text-xs">${statusDot} ${(r.status || 'done').charAt(0).toUpperCase() + (r.status || 'done').slice(1)}</span>
          </div>
          <div class="flex items-center gap-3 text-xs text-gray-500">
            <span title="Agents">${esc(agents)}</span>
            <span class="text-gray-300">|</span>
            <span>${fmtTime(r.started_at)}</span>
            ${r.bot_id ? `<span class="text-gray-300">|</span><span class="font-mono" style="font-size:10px">${esc(r.bot_id)}</span>` : ''}
          </div>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <div class="text-center">
            <div class="text-sm font-bold" style="color:${pctColor}">${pct}%</div>
            <div class="text-xs text-gray-400" style="font-size:9px">pass rate</div>
          </div>
          <div class="flex items-center gap-2 text-xs">
            <span class="font-semibold" style="color:var(--success)">${passed}P</span>
            <span class="text-gray-300">/</span>
            <span class="font-semibold" style="color:var(--error)">${failed}F</span>
            <span class="text-gray-300">/</span>
            <span class="text-gray-500">${total}</span>
          </div>
          <!-- Delete button -->
          <button onclick="deleteRun('${r.source}', ${r.id}, event)" class="btn btn-icon btn-danger" title="Delete run">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9"/>
            </svg>
          </button>
          <!-- Expand/collapse chevron -->
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               style="transform:${isExpanded ? 'rotate(180deg)' : 'none'};transition:transform .15s;color:var(--text-3);flex-shrink:0">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </div>
      </div>
      <!-- Expanded test case details -->
      ${isExpanded ? `
        <div class="px-4 pb-4 pt-2 fade-in" style="border-top:1px solid var(--border)">
          <div class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Test Cases</div>
          ${renderTestCases(r)}
        </div>
      ` : ''}
    </div>`;
  }).join('');

  updateSelectionUI();
}

// ── Download ──────────────────────────────────────────────────────────────────
async function downloadSelected() {
  if (!selectedRunIds.size) return;

  const btn = document.getElementById('btn-download');
  btn.disabled = true;
  btn.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full" style="animation:spin .6s linear infinite"></span> Generating...';

  const runs = [];
  selectedRunIds.forEach(key => {
    const [source, id] = key.split(':');
    runs.push({ source, run_id: parseInt(id) });
  });

  try {
    const resp = await fetch('/api/reporting/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ runs }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert(err.error || 'Download failed');
      return;
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = runs.length > 1 ? 'consolidated_report.pdf' : 'test_report.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Download failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10"/></svg> Download PDF';
    updateSelectionUI();
  }
}

// Init filter highlight
setFilter('all');
init();
</script>
</body>
</html>
